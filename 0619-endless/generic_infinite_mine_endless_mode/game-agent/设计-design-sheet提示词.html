<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Sheet 提示词审核器</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; background: #f5f7fb; color: #202733; font-size: 14px; }
.wrap { max-width: 1480px; margin: 0 auto; padding: 20px; }
h1 { font-size: 22px; margin: 0 0 12px; }
.toolbar { position: sticky; top: 0; z-index: 30; background: rgba(245,247,251,.96); backdrop-filter: blur(6px); padding: 10px 0 14px; border-bottom: 1px solid #e6eaf2; margin-bottom: 16px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn, .filter-btn { border: 1px solid #d8dee9; background: #fff; color: #263244; border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
.btn:disabled { opacity: .55; cursor: not-allowed; }
.btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
.filter-btn.active { background: #1677ff; color: #fff; border-color: #1677ff; }
.layout { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 18px; align-items: start; }
.card { background: #fff; border: 1px solid #e5eaf2; border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.card.hidden { display: none; }
.card.active { outline: 2px solid #1677ff; }
.card-head { display: flex; gap: 10px; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.card-title { font-weight: 700; font-size: 16px; }
.badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.badge { border-radius: 999px; padding: 2px 8px; font-size: 12px; background: #eef2f7; color: #4b5563; }
.badge.sheet { background: #e6f4ff; color: #0958d9; }
.badge.asset { background: #f6ffed; color: #237804; }
.badge.err { background: #fff1f0; color: #cf1322; }
.badge.warn { background: #fff7e6; color: #d46b08; }
.badge.info { background: #f9f0ff; color: #722ed1; }
.meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 6px; }
.field { display: inline-flex; align-items: baseline; gap: 6px; max-width: 100%; background: #f8fafc; border: 1px solid #edf1f7; border-radius: 999px; padding: 3px 8px; color: #64748b; }
.field label { color: #64748b; font-size: 11px; margin: 0; white-space: nowrap; }
.field .value { color: #263244; font-size: 12px; font-weight: 600; word-break: break-word; }
.asset-module { display: grid; grid-template-columns: minmax(0, 1fr) 230px; gap: 14px; align-items: start; }
.asset-prompt-col { min-width: 0; }
.asset-preview-col { border-left: 1px solid #edf1f7; padding-left: 14px; }
.asset-preview-title { font-weight: 700; color: #334155; margin-bottom: 8px; }
.asset-preview-path { color: #64748b; font-size: 12px; word-break: break-all; margin-bottom: 8px; }
.asset-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 10px; border: 1px solid #e5eaf2; display: block; background: #f8fafc; }
.asset-empty { border: 2px dashed #d8dee9; color: #94a3b8; min-height: 150px; padding: 36px 12px; text-align: center; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #fbfdff; }
.asset-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.regen-status { color: #64748b; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
.regen-status.ok { color: #237804; }
.regen-status.err { color: #cf1322; }
.regen-hint { color: #d46b08; font-size: 12px; line-height: 1.5; }
.prompt-box { border-top: 1px solid #edf1f7; padding-top: 12px; margin-top: 12px; }
.prompt-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; color: #334155; font-weight: 700; }
.prompt-pre { margin: 0; white-space: pre-wrap; word-break: break-word; background: #fbfdff; border: 1px solid #e5eaf2; border-radius: 10px; padding: 14px; font: 13px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: #1f2937; }
.prompt-edit { display: none; width: 100%; min-height: 420px; resize: vertical; border: 1px solid #1677ff; border-radius: 10px; padding: 14px; font: 13px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: #fff; color: #1f2937; }
.card.editing .prompt-pre { display: none; }
.card.editing .prompt-edit { display: block; }
.issues { margin: 10px 0; display: flex; gap: 6px; flex-wrap: wrap; }
.issue { font-size: 12px; border-radius: 6px; padding: 4px 8px; }
.issue.error { background: #fff1f0; color: #cf1322; }
.issue.warning { background: #fff7e6; color: #d46b08; }
.issue.info { background: #f9f0ff; color: #722ed1; }
.side { position: sticky; top: 82px; background: #fff; border: 1px solid #e5eaf2; border-radius: 12px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.side h2 { font-size: 15px; margin: 0 0 8px; }
.side .muted { color: #64748b; font-size: 12px; margin-bottom: 10px; }
.side img { width: 100%; border-radius: 10px; border: 1px solid #e5eaf2; display: block; background: #f8fafc; }
.empty-img { border: 2px dashed #d8dee9; color: #94a3b8; padding: 40px 14px; text-align: center; border-radius: 10px; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { width:min(1000px, 92vw); max-height:82vh; overflow:auto; background:#fff; border-radius:12px; padding:18px; }
.modal pre { white-space:pre-wrap; word-break:break-word; background:#f5f7fb; padding:14px; border-radius:8px; font-size:12px; }
@media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .side { position: static; } .asset-module { grid-template-columns: 1fr; } .asset-preview-col { border-left: 0; border-top: 1px solid #edf1f7; padding-left: 0; padding-top: 14px; } }
</style>
<style>
  :root { --pl-topbar-h: 0px; }
  .pl-topbar { position: sticky; top: 0; z-index: 900;
    font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  .pl-topbar .pl-bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px;
    background: #1f2937; color: #e5e7eb; }
  .pl-topbar.has-todos .pl-bar { background: #78350f; box-shadow: inset 4px 0 0 #f59e0b; }
  .pl-topbar .pl-dots { display: flex; gap: 5px; flex-shrink: 0; }
  .pl-topbar .pl-dot { width: 10px; height: 10px; border-radius: 50%; background: #4b5563; }
  .pl-topbar .pl-dot.done { background: #10b981; }
  .pl-topbar .pl-dot.current { background: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.35); }
  .pl-topbar .pl-dot.blocked { background: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,.35); }
  .pl-topbar .pl-label { font-weight: 600; color: #fff; white-space: nowrap; }
  .pl-topbar .pl-todo-hint { color: #fcd34d; white-space: nowrap; font-weight: 600; }
  .pl-topbar .pl-spacer { flex: 1; }
  .pl-topbar a.pl-home { color: #93c5fd; text-decoration: none; white-space: nowrap; font-weight: 600; }
  .pl-topbar.has-todos a.pl-home { color: #fde68a; }
  .pl-topbar a.pl-home:hover { text-decoration: underline; }
  /* 收起/展开按钮：默认展开，点击收起待办面板腾出阅读区 */
  .pl-topbar .pl-toggle { flex-shrink: 0; cursor: pointer; font: inherit; font-weight: 600; color: inherit;
    background: transparent; border: 1px solid rgba(255,255,255,.35); border-radius: 6px;
    padding: 2px 10px; white-space: nowrap; }
  .pl-topbar .pl-toggle:hover { background: rgba(255,255,255,.14); }
  .pl-topbar.collapsed .pl-todos { display: none; }
  /* 本产物待办面板：固定展开。红色=本产物规则/重要提示，橙色=待办 */
  .pl-todos { background: #fffaf3; border-bottom: 2px solid #fa8c16;
    padding: 12px 18px; max-height: 48vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
    font-size: 13.5px; line-height: 1.7; }
  /* 红色：规则 / 重要提示 */
  .pl-note { display: flex; gap: 12px; align-items: flex-start;
    background: #fff1f0; border: 1px solid #ffccc7; border-left: 5px solid #f5222d; border-radius: 10px;
    padding: 12px 16px; color: #5c0011; box-shadow: 0 1px 4px rgba(245,34,45,0.12); }
  .pl-note .pl-note-icon { flex-shrink: 0; font-size: 20px; line-height: 1.4; }
  .pl-note .pl-note-body { flex: 1; }
  .pl-note .pl-note-line { font-weight: 600; }
  .pl-note .pl-note-line + .pl-note-line { margin-top: 4px; }
  .pl-note b { color: #cf1322; }
  /* 橙色：待办 */
  .pl-todobox { display: flex; gap: 12px; align-items: flex-start;
    background: #fff7e6; border: 1px solid #ffd591; border-left: 5px solid #fa8c16; border-radius: 10px;
    padding: 12px 16px; color: #613400; box-shadow: 0 1px 4px rgba(250,140,22,0.12); }
  .pl-todobox .pl-todobox-icon { flex-shrink: 0; font-size: 20px; line-height: 1.4; }
  .pl-todobox .pl-todobox-body { flex: 1; }
  .pl-todobox .pl-todobox-title { font-weight: 700; color: #d46b08; font-size: 14px; margin-bottom: 7px; }
  .pl-todos .pl-gate { font-weight: 700; color: #d46b08; margin: 9px 0 5px; font-size: 13px; }
  .pl-todos ul { margin: 0; padding: 0; list-style: none; }
  .pl-todos li { display: flex; align-items: flex-start; gap: 9px; padding: 5px 0; }
  .pl-todos li + li { border-top: 1px dashed #ffd591; }
  /* 序号圆点 */
  .pl-todos .pl-step-n { display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; background: #fa8c16; color: #fff;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .pl-todos .pl-todo-text { flex: 1; }
  .pl-todos a.pl-todo-go { display: inline-block; margin-left: 8px; vertical-align: baseline;
    color: #ad4e00; text-decoration: none; white-space: nowrap; font-weight: 600;
    border: 1px solid #ffd666; border-radius: 5px; padding: 0 9px; background: #fff1b8; }
  .pl-todos a.pl-todo-go:hover { background: #ffe58f; border-color: #fa8c16; }
  .pl-todos .pl-todo-none { color: #237804; font-weight: 600; }
  @media (prefers-color-scheme: dark) {
    .pl-todos { background: #2a2118; border-bottom-color: #b45309; }
  }
  .pl-anchor-hl { background: #fffbeb; outline: 2px solid #fde68a; outline-offset: 2px;
    border-radius: 4px; scroll-margin-top: calc(var(--pl-topbar-h) + 12px); }
  /* 让页面内其他 sticky/fixed 元素让位给顶栏，互不遮挡 */
  html { scroll-padding-top: calc(var(--pl-topbar-h) + 12px) !important; }
  .toc { top: var(--pl-topbar-h) !important; height: calc(100vh - var(--pl-topbar-h)) !important; }
  .edit-toolbar { top: var(--pl-topbar-h) !important; }
  thead, thead th, table th { top: var(--pl-topbar-h) !important; }
  .page-with-visual .page-visual, .page-visual, .scene-visual { top: calc(var(--pl-topbar-h) + 16px) !important; }
</style>
</head>
<body>
<div id="pl-topbar" class="pl-topbar" data-step="6">
  <div class="pl-bar">
    <div class="pl-dots"></div><span class="pl-label"></span><span class="pl-todo-hint"></span>
    <span class="pl-spacer"></span>
    <a class="pl-home" href="./流水线总览.html">📋 流水线总览 →</a>
    <button type="button" class="pl-toggle" id="pl-toggle" aria-expanded="true">收起 ▲</button>
  </div>
  <div class="pl-todos" id="pl-todos"></div>
</div>
<script src="./idea-pipeline-data.js"></script>
<script>
(function () {
  var bar = document.getElementById("pl-topbar");
  if (!bar) return;
  function normalizeIdeaStatus(D) {
    if (!D || !D.steps) return null;
    var gates = [];
    var all = D.allStepTodos || {};
    Object.keys(all).forEach(function (stepId) {
      (all[stepId] || []).forEach(function (g) {
        var files = g.artifactFiles || [];
        var todos = [];
        (g.todos || []).forEach(function (text) {
          if (files.length) files.forEach(function (file) { todos.push({ text: text, link: file }); });
          else todos.push({ text: text, link: "" });
        });
        gates.push({ gateName: g.title || g.gate || ("第 " + stepId + " 步"), note: g.note, todos: todos });
      });
    });
    return { current: D.current, steps: D.steps, gates: gates, artifacts: D.artifacts || [] };
  }
  var S = window.PIPELINE_STATUS || normalizeIdeaStatus(window.IDEA_PIPELINE_DATA);
  var dots = bar.querySelector(".pl-dots");
  var label = bar.querySelector(".pl-label");
  var hint = bar.querySelector(".pl-todo-hint");
  var panel = document.getElementById("pl-todos");
  var toggle = document.getElementById("pl-toggle");
  var fallback = Number(bar.getAttribute("data-step")) || 1;
  var currentFile = "";
  try { currentFile = decodeURIComponent((location.pathname || "").split("/").pop() || ""); }
  catch (e) { currentFile = (location.pathname || "").split("/").pop() || ""; }
  function baseName(p) { return String(p || "").split("/").pop(); }
  // link 形如 "需求-最终PRD.html#reviewPanel" → { file, hash }
  function parseLink(link) {
    var s = String(link || ""); var i = s.indexOf("#");
    return i >= 0 ? { file: s.slice(0, i), hash: s.slice(i + 1) } : { file: s, hash: "" };
  }

  // 顶栏实测高度写入 --pl-topbar-h，供页面内其他 sticky 元素让位（折叠/展开、resize 后重算）
  function syncHeight() {
    document.documentElement.style.setProperty("--pl-topbar-h", bar.offsetHeight + "px");
  }

  // 收起/展开：默认展开，状态按当前文件名持久化到 localStorage（刷新后保留）
  var collapseKey;
  try { collapseKey = "pl-collapse::" + ((location.pathname || "").split("/").pop() || "default"); }
  catch (e) { collapseKey = "pl-collapse::default"; }
  function applyCollapsed(collapsed) {
    bar.classList.toggle("collapsed", collapsed);
    if (toggle) {
      toggle.textContent = collapsed ? "展开TODO ▼" : "收起TODO ▲";
      toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
    }
    syncHeight();
  }
  if (toggle) {
    toggle.addEventListener("click", function () {
      var next = !bar.classList.contains("collapsed");
      try { localStorage.setItem(collapseKey, next ? "1" : "0"); } catch (e) {}
      applyCollapsed(next);
    });
  }
  var savedCollapse = null;
  try { savedCollapse = localStorage.getItem(collapseKey); } catch (e) {}

  if (!S || !S.steps) {
    label.textContent = "第 " + fallback + " 步";
    panel.style.display = "none";
    if (toggle) toggle.style.display = "none";  // 无待办面板可折叠，隐藏按钮
    syncHeight();
    return;
  }
  applyCollapsed(savedCollapse === "1");  // 默认展开
  S.steps.forEach(function (st) {
    var d = document.createElement("span");
    d.className = "pl-dot " + st.status;
    d.title = st.id + " " + st.name;
    dots.appendChild(d);
  });
  var cur = S.steps.filter(function (s) { return s.id === S.current; })[0];
  if (cur) label.textContent = S.current + "/" + S.steps.length + " " + cur.name;
  // 本产物自身所属 step：idea2game 可从 artifacts 反查；无匹配时使用 data-step 降级。
  var artifactStepId = fallback;
  if (S.artifacts && currentFile) {
    var art = S.artifacts.filter(function (a) { return baseName(a.file) === currentFile; })[0];
    if (art && art.stepId) artifactStepId = art.stepId;
  }
  var artStep = S.steps.filter(function (s) { return s.id === artifactStepId; })[0];
  var artStatus = artStep ? artStep.status : "";
  var artName = artStep ? artStep.name : ("第 " + artifactStepId + " 步");
  var curName = cur ? cur.name : "";

  // 只展示「本产物」的待办：按 todo.link 文件名与当前页面文件名匹配过滤
  // （同一步可能跨多个产物，如元素清单校验步含 PRD 回补 + 元素清单编辑两门，各产物只看自己那部分）
  var gates = (S.gates || []).map(function (g) {
    var todos = (g.todos || []).filter(function (t) {
      var f = parseLink(t.link).file;
      return !!f && (!currentFile || baseName(f) === currentFile);
    });
    return { gateName: g.gateName, note: g.note, todos: todos };
  }).filter(function (g) { return g.todos.length; });
  var total = gates.reduce(function (n, g) { return n + g.todos.length; }, 0);
  if (hint) {
    hint.textContent = total > 0 ? "· 本产物 " + total + " 项待确认"
      : artStatus === "done" ? "· 本阶段已完成"
      : artStatus === "current" ? "· 本产物无待办"
      : "· 本阶段未开始";
  }

  var multiGate = gates.length > 1;
  if (total > 0) {
    bar.classList.add("has-todos");
    var htmlStr = "";

    // 红色：本产物规则 / 重要提示（note 可为字符串或数组）
    var notes = [];
    gates.forEach(function (g) {
      if (!g.note) return;
      (Array.isArray(g.note) ? g.note : [g.note]).forEach(function (n) { if (n) notes.push(n); });
    });
    if (notes.length) {
      htmlStr += '<div class="pl-note"><span class="pl-note-icon">⚠️</span><div class="pl-note-body">'
        + notes.map(function (n) { return '<div class="pl-note-line">' + esc(n) + "</div>"; }).join("")
        + "</div></div>";
    }

    // 橙色：待办列表（每条带序号圆点）
    htmlStr += '<div class="pl-todobox"><span class="pl-todobox-icon">📝</span><div class="pl-todobox-body">';
    htmlStr += '<div class="pl-todobox-title">TODO（' + total + "）</div>";
    var seq = 0;
    gates.forEach(function (g) {
      if (multiGate && g.gateName) htmlStr += '<div class="pl-gate">' + esc(g.gateName) + "</div>";
      htmlStr += "<ul>";
      g.todos.forEach(function (t) {
        seq += 1;
        var pl = parseLink(t.link);
        var sameFile = pl.file && baseName(pl.file) === currentFile;
        var go = "";
        if (t.action && /^[A-Za-z_$][\w$]*$/.test(t.action)) {
          // 本产物内的 JS 动作（如导出变更记录）→ 「前往」直接调用页面内函数（拉起弹窗）
          go = '<a class="pl-todo-go" href="#" data-action="' + esc(t.action) + '">前往 →</a>';
        } else if (sameFile && pl.hash) {
          // 本产物内有锚点 → 「前往」滚动到对应模块（hashchange 触发高亮 + scroll-padding 让位顶栏）
          go = '<a class="pl-todo-go" href="#' + esc(pl.hash) + '">前往 →</a>';
        } else if (pl.file && !sameFile) {
          // 指向别的产物 → 「去处理」跨页跳转（带锚点，目标页自动高亮）
          go = '<a class="pl-todo-go" href="' + esc(t.link) + '">去处理 →</a>';
        }
        htmlStr += '<li><span class="pl-step-n">' + seq + '</span><span class="pl-todo-text">' + esc(t.text || "") + go + "</span></li>";
      });
      htmlStr += "</ul>";
    });
    htmlStr += "</div></div>";

    panel.innerHTML = htmlStr;

    // 「前往」绑定页面内动作（data-action）→ 调用同文档全局函数（如 exportEdits 拉起变更记录弹窗）
    panel.addEventListener("click", function (e) {
      var a = e.target && e.target.closest && e.target.closest(".pl-todo-go[data-action]");
      if (!a) return;
      e.preventDefault();
      var fn = a.getAttribute("data-action");
      if (typeof window[fn] === "function") window[fn]();
    });
  } else {
    var noneIcon, noneMsg;
    if (artStatus === "done") {
      noneIcon = "✅";
      noneMsg = "✓ 本阶段「" + artName + "」已完成。流水线当前进行到 " + S.current + "/" + S.steps.length + " " + curName + "，其余待办见流水线总览。";
    } else if (artStatus === "current") {
      noneIcon = "✅";
      noneMsg = "✓ 本产物无需手动确认（其他产物待办见流水线总览）";
    } else {
      noneIcon = "ℹ️";
      noneMsg = "本阶段「" + artName + "」尚未开始（流水线当前在第 " + S.current + " 步）。";
    }
    panel.innerHTML = '<div class="pl-todobox"><span class="pl-todobox-icon">' + noneIcon + '</span><div class="pl-todobox-body">'
      + '<span class="pl-todo-none">' + esc(noneMsg) + '</span></div></div>';
  }
  syncHeight();
  window.addEventListener("resize", syncHeight);
  window.addEventListener("load", syncHeight);

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // 锚点高亮：URL 带 #xxx 时给目标元素加高亮类（先清掉上一个，避免多次跳转累积）
  function hl() {
    var id = decodeURIComponent((location.hash || "").slice(1));

const state = JSON.parse(document.getElementById('prompt-data').textContent);
let data = state.prompts;
let showFullPrompt = false;
function esc(v){ return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function issueBadges(p){ return p.validations.map(i => '<span class="issue '+i.level+'">'+esc(i.text)+'</span>').join(''); }
function cardTags(p){ const tags=['all']; if(p.sceneType) tags.push(String(p.sceneType).toLowerCase()); if(p.hasBake) tags.push('bake'); if(p.validations.length) tags.push('issue'); if(!p.pageSrc) tags.push('missing-page'); return tags.join(' '); }
function apiBase(){ return (location.protocol === 'http:' || location.protocol === 'https:') ? '' : (state.serverBaseUrl || ''); }
function regenAvailable(){ return Boolean(apiBase() || location.protocol === 'http:' || location.protocol === 'https:'); }
function render(){
  document.getElementById('cards').innerHTML = data.map((p, idx) => {
    return '<article class="card" data-tags="'+cardTags(p)+'" data-idx="'+idx+'" onmouseenter="showPage('+idx+')" onclick="showPage('+idx+'); setActive(this)">'
      + '<div class="asset-module"><div class="asset-prompt-col">'
      + '<div class="card-head"><div><div class="card-title">'+esc(p.title)+'</div><div class="badges"><span class="badge '+esc(String(p.sceneType || '').toLowerCase())+'">'+esc(p.sceneType || '缺场景类型')+'</span><span class="badge">'+esc(p.sceneId || '缺所属场景')+'</span><span class="badge">'+esc(p.fileName || '缺文件名')+'</span>'+(p.hasBake?'<span class="badge info">烘焙</span>':'')+'</div></div></div>'
      + '<div class="meta">'+metaField('场景类型',p.sceneType)+metaField('所属场景',p.sceneId)+metaField('建议文件名',p.fileName)+metaField('目标比例',p.ratio)+metaField('切片清单',p.slices.join(', '))+'</div>'
      + (p.validations.length ? '<div class="issues">'+issueBadges(p)+'</div>' : '')
      + '<div class="prompt-box"><div class="prompt-title"><span>'+esc(showFullPrompt ? '完整 Prompt' : 'Prompt（已隐藏质量要求 / 负面约束）')+'</span><button class="btn" onclick="event.stopPropagation(); toggleEdit('+idx+', this)">✏️ 编辑 Prompt</button></div><pre class="prompt-pre">'+esc(promptDisplay(p))+'</pre><textarea class="prompt-edit" onchange="editPrompt('+idx+', this.value)">'+esc(promptFull(p))+'</textarea></div>'
      + '</div><div class="asset-preview-col" id="assetPreview-'+idx+'">'+assetPreviewHtml(p, idx)+'</div></div>'
      + '</article>';
  }).join('');
}
function metaField(key,val){ return '<div class="field"><label>'+esc(key)+'</label><div class="value">'+esc(val || '—')+'</div></div>'; }
function setActive(el){ document.querySelectorAll('.card.active').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }
function showPage(idx){ const p=data[idx]; document.getElementById('sideTitle').textContent = p.sceneId || '缺所属场景'; document.getElementById('sideMeta').textContent = (p.fileName||'') + ' · page图: ' + (p.pagePromptFileName || '未匹配'); document.getElementById('sideImage').outerHTML = p.pageSrc ? '<img id="sideImage" src="'+esc(p.pageSrc)+'" alt="'+esc(p.sceneId)+'">' : '<div id="sideImage" class="empty-img">未找到 page 图</div>'; }
function promptFull(p){ return p.promptZh || p.sectionsZh.map(s => '【'+s.title+'】\n'+s.body).join('\n\n'); }
function isHiddenPromptSection(title){ return /质量要求|负面约束/.test(String(title || '')); }
function stripHiddenPromptSections(text){
  let hidden = false;
  return String(text || '').split('\n').filter(line => {
    const m = line.match(/^【([^】]+)】\s*$/);
    if (m) hidden = isHiddenPromptSection(m[1]);
    return !hidden;
  }).join('\n').replace(/\n{3,}/g, '\n\n').trim();
}
function promptDisplay(p){ const text = promptFull(p); return showFullPrompt ? text : stripHiddenPromptSections(text); }
function toggleFullPrompt(){ showFullPrompt = !showFullPrompt; document.getElementById('fullPromptBtn').textContent = showFullPrompt ? '🙈 隐藏质量/负面约束' : '👁️ 显示完整 Prompt'; render(); }
function toggleEdit(idx, btn){ const card = btn.closest('.card'); const editing = !card.classList.contains('editing'); card.classList.toggle('editing', editing); btn.textContent = editing ? '✅ 完成编辑' : '✏️ 编辑 Prompt'; if (editing) { const ta = card.querySelector('.prompt-edit'); ta.focus(); ta.selectionStart = ta.selectionEnd = ta.value.length; } else { const ta = card.querySelector('.prompt-edit'); editPrompt(idx, ta.value); card.querySelector('.prompt-pre').textContent = promptDisplay(data[idx]); } }
function editPrompt(idx,val){ data[idx].promptZh = val; }
function assetImgFallback(img){
  try {
    const cands = JSON.parse(img.getAttribute('data-cands') || '[]');
    const ci = parseInt(img.getAttribute('data-ci') || '0', 10) + 1;
    if (ci < cands.length) { img.setAttribute('data-ci', String(ci)); img.src = cands[ci]; return; }
  } catch (e) {}
  const box = img.parentNode;
  if (box) box.innerHTML = '<div class="asset-empty">暂无生成图</div>';
}
function assetPreviewHtml(p, idx){
  const available = regenAvailable();
  let img;
  if (p.assetSrc) {
    img = '<img class="asset-img" src="'+esc(p.assetSrc)+'" alt="'+esc(p.fileName || p.title)+'">';
  } else if (p.assetCandidates && p.assetCandidates.length) {
    img = '<img class="asset-img" src="'+esc(p.assetCandidates[0])+'" data-cands="'+esc(JSON.stringify(p.assetCandidates))+'" data-ci="0" alt="'+esc(p.fileName || p.title)+'" onerror="assetImgFallback(this)">';
  } else {
    img = '<div class="asset-empty">暂无生成图</div>';
  }
  const disabled = available ? '' : ' disabled';
  const hint = available ? '' : '<div class="regen-hint">重新生成需要通过流水线本地服务打开本页；可从 流水线总览.html 进入。</div>';
  return '<div class="asset-preview-title">生成素材预览</div>'
    + '<div class="asset-preview-path">'+esc(p.assetLocalPath || '未解析输出路径')+'</div>'
    + '<div class="asset-image-box">'+img+'</div>'
    + '<div class="asset-actions"><button class="btn btn-primary" '+disabled+' onclick="event.stopPropagation(); regenerateAsset('+idx+', this)">🔄 重新生成</button>'+hint+'<div class="regen-status" id="regenStatus-'+idx+'"></div></div>';
}
function updateAssetPreview(idx){ const el = document.getElementById('assetPreview-'+idx); if(el) el.innerHTML = assetPreviewHtml(data[idx], idx); }
function setRegenStatus(idx, text, kind){ const el = document.getElementById('regenStatus-'+idx); if(!el) return; el.textContent = text || ''; el.classList.toggle('ok', kind === 'ok'); el.classList.toggle('err', kind === 'err'); }
async function regenerateAsset(idx, btn){
  const p = data[idx];
  const card = btn.closest('.card');
  const ta = card ? card.querySelector('.prompt-edit') : null;
  const latestPrompt = ta ? ta.value : promptFull(p);
  editPrompt(idx, latestPrompt);
  const base = apiBase();
  if (!regenAvailable()) { setRegenStatus(idx, '请通过流水线本地服务打开本页后再重新生成。', 'err'); return; }
  btn.disabled = true;
  setRegenStatus(idx, '生成中，请稍候...');
  try {
    const res = await fetch(base + '/__idea_asset_regenerate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: p.id, sceneType: p.sceneType, sceneId: p.sceneId, fileName: p.fileName, ratio: p.ratio, prompt: latestPrompt, pagePromptFileName: p.pagePromptFileName || '' })
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok || !json.success) throw new Error(json.error || ('HTTP ' + res.status));
    if (json.previewUrl) p.assetSrc = json.previewUrl;
    if (json.output) p.assetLocalPath = json.output;
    updateAssetPreview(idx);
    setRegenStatus(idx, '生成完成：' + (json.output || p.assetLocalPath || ''), 'ok');
    showPage(idx);
  } catch (err) {
    setRegenStatus(idx, '生成失败：' + err.message, 'err');
  } finally {
    btn.disabled = false;
  }
}
function applyFilter(filter){ document.querySelectorAll('.card').forEach(c => c.classList.toggle('hidden', filter !== 'all' && !(c.dataset.tags||'').split(' ').includes(filter))); }
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilter(btn.dataset.filter); }));
function promptText(p){ return promptFull(p); }
function blockMd(p){ const lines=[]; lines.push('#'.repeat(p.level || 3)+' '+p.title); lines.push(''); lines.push('- 场景类型: '+(p.sceneType||'')); lines.push('- 所属场景: '+(p.sceneId||'')); lines.push('- 建议文件名: '+(p.fileName||'')); if(p.ratio) lines.push('- 目标比例: '+p.ratio); if(p.slices?.length) lines.push('- 切片清单: '+p.slices.join(', ')); for(const [k,v] of Object.entries(p.meta||{})){ if(!['场景类型','所属场景','建议文件名','目标比例','建议比例','切片清单'].includes(k)) lines.push('- '+k+': '+v); } lines.push(''); lines.push('📋 🇨🇳:'); lines.push(promptText(p)); if(p.promptEn){ lines.push(''); lines.push('📋 🇬🇧:'); lines.push(p.promptEn); } return lines.join('\n'); }
function exportFullMd(){ const text = [state.preamble, ...data.map(blockMd)].filter(Boolean).join('\n\n')+'\n'; document.getElementById('modalContent').textContent=text; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function copyModal(){ navigator.clipboard.writeText(document.getElementById('modalContent').textContent).then(()=>alert('已复制')); }
render();
</script>
</body>
</html>
