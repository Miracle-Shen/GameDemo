dius:10px;padding:12px;font:12px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.page-prompt-edit{display:none;width:100%;height:auto;min-height:0;flex:1;resize:vertical;background:var(--card);color:var(--fg);border:1px solid var(--accent);border-radius:10px;padding:12px;font:12px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.page-item.editing .page-prompt-pre{display:none}.page-item.editing .page-prompt-edit{display:block}.page-visual{border-left:1px solid var(--border);padding-left:16px}.page-image-box{display:block}.page-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.page-actions .btn{width:100%;justify-content:center}.page-regen-status{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word;margin-top:8px}.page-regen-status:empty{display:none}.page-regen-status.ok{color:#237804}.page-regen-status.err{color:#cf1322}.page-hint{font-size:12px;color:#ad4e00;margin-top:8px}

<script>
(function(){
var app=document.getElementById('app');
var selected=null;
var pagePromptOverrides={};
var pageRegenStatus={};
var pageRegenBusy={};
var pageEditingScene='';
var pageShowFullPrompt=false;
var overviewPromptOverrides={};
var overviewRegenStatus={};
var overviewRegenBusy={};
var overviewEditingScene='';
var overviewShowFullPrompt=false;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function inline(s){s=esc(s);s=s.replace(new RegExp('\x60([^\x60]+)\x60','g'),'<code>$1</code>');s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(_,t,u){return '<a href="'+esc(u)+'">'+esc(t)+'</a>';});return s;}
function slug(s,i){return 'h-'+i+'-'+String(s||'').toLowerCase().replace(/[^a-z0-9一-龥]+/g,'-').replace(/^-|-$/g,'');}
function renderMd(md){
  var lines=String(md||'').split('\n'), out=[], inCode=false, code=[], inTable=false, table=[], inList=false, listType='', items=[], hc=0;
  function flushList(){if(!inList)return;out.push('<'+listType+'>');items.forEach(function(x){out.push('<li>'+inline(x)+'</li>')});out.push('</'+listType+'>');inList=false;items=[];}
  function flushTable(){if(!inTable)return;var sep=-1;for(var i=0;i<table.length;i++){var cs=table[i].split('|').slice(1,-1);if(cs.length&&cs.every(function(c){return /^[\s:-]+$/.test(c.trim())})){sep=i;break;}}out.push('<div class="table-wrap"><table>');for(var r=0;r<table.length;r++){if(r===sep)continue;var cells=table[r].split('|');if(cells[0].trim()==='')cells.shift();if(cells.length&&cells[cells.length-1].trim()==='')cells.pop();var tag=(sep>=0&&r<sep)?'th':'td';out.push('<tr>'+cells.map(function(c){return '<'+tag+'>'+inline(c.trim())+'</'+tag+'>';}).join('')+'</tr>');}out.push('</table></div>');inTable=false;table=[];}
  lines.forEach(function(line){
    if(line.charCodeAt(0)===96&&line.charCodeAt(1)===96&&line.charCodeAt(2)===96){if(!inCode){flushList();flushTable();inCode=true;code=[];}else{out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');inCode=false;}return;}
    if(inCode){code.push(line);return;}
    if(line.trim().startsWith('|')&&line.indexOf('|')>=0){flushList();inTable=true;table.push(line);return;} else if(inTable){flushTable();}
    var hm=line.match(/^(#{1,6})\s+(.+)/);if(hm){flushList();hc++;var lv=hm[1].length, text=hm[2];out.push('<h'+lv+' id="'+slug(text,hc)+'">'+inline(text)+'</h'+lv+'>');return;}
    if(/^(-{3,}|_{3,}|\*{3,})\s*$/.test(line.trim())){flushList();out.push('<hr>');return;}
    if(line.startsWith('>')){flushList();out.push('<blockquote>'+inline(line.replace(/^>\s?/,''))+'</blockquote>');return;}
    var ul=line.match(/^\s*[-*+]\s+(.+)/);if(ul){if(!inList||listType!=='ul'){flushList();inList=true;listType='ul';}items.push(ul[1]);return;}
    var ol=line.match(/^\s*\d+\.\s+(.+)/);if(ol){if(!inList||listType!=='ol'){flushList();inList=true;listType='ol';}items.push(ol[1]);return;}
    if(line.trim()===''){flushList();return;}
    flushList();out.push('<p>'+inline(line)+'</p>');
  });
  if(inCode)out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');flushList();flushTable();return '<div class="md">'+out.join('\n')+'</div>';
}
function todoHtml(groups, emptyText){groups=groups||[];if(!groups.length)return '<div class="empty">'+esc(emptyText||'暂无 TODO')+'</div>';return '<div class="todo-groups">'+groups.map(function(g){return '<div class="todo-box"><div class="todo-icon">📝</div><div><div class="todo-title">'+esc(g.title||'TODO')+'</div><ol>'+((g.todos||[]).map(function(t){return '<li>'+esc(t)+'</li>'}).join(''))+'</ol></div></div>';}).join('')+'</div>';}
function renderConceptGallery(S,a){var concepts=S.concepts||[];if(a&&a.readError)return '<div class="concept-toolbar"><span class="concept-status warn">引用数据异常</span><span>'+esc(a.readError)+'</span></div><div class="missing-note">请打开引用数据检查 JSON 结构。</div>';if(!concepts.length)return '<div class="concept-toolbar"><span class="concept-status warn">0 张概念图</span></div><div class="missing-note">概念图引用数据已生成，但 concepts 列表为空。</div>';var missing=concepts.filter(function(c){return !c.src;}).length;var refs=S.conceptRefs||{};var toolbar='<div class="concept-toolbar"><span class="concept-status">'+concepts.length+' 张概念图</span>'+(missing?'<span class="concept-status warn">'+missing+' 张缺少可用图片</span>':'')+(refs.generatedAt?'<span>生成 '+esc(refs.generatedAt)+'</span>':'')+'</div>';return toolbar+'<div class="concept-grid">'+concepts.map(function(c){var title=c.localPath||c.imageUrl||c.sceneId||'';var img=c.src?'<a href="'+esc(c.src)+'" target="_blank"><img class="concept-thumb" src="'+esc(c.src)+'" alt="'+esc(c.label||c.sceneId||'概念图')+'"></a>':'<div class="concept-missing">'+(c.localPath?'本地图片缺失':'未找到图片')+'</div>';var tags=[];if(c.srcKind==='local')tags.push('本地图片');if(c.srcKind==='remote')tags.push('远程图片');if(c.localPath&&!c.localExists)tags.push('本地缺失');if(c.model)tags.push(c.model);return '<div class="concept-item">'+img+'<div class="concept-meta"><div class="concept-name">'+esc(c.label||c.sceneId||'概念图')+'</div><div class="concept-path" title="'+esc(title)+'">'+esc(title)+'</div>'+(tags.length?'<div class="concept-tags">'+tags.map(function(t){return '<span class="concept-tag">'+esc(t)+'</span>';}).join('')+'</div>':'')+'</div></div>';}).join('')+'</div>';}
function overviewPromptFull(o){if(Object.prototype.hasOwnProperty.call(overviewPromptOverrides,o.sceneId))return overviewPromptOverrides[o.sceneId];return o.promptZh||o.promptEn||'';}
function overviewPromptDisplay(o){var text=overviewPromptFull(o);return overviewShowFullPrompt?text:stripHiddenPagePromptSections(text);}
function overviewStatusHtml(sceneId){var s=overviewRegenStatus[sceneId]||{};return '<div class="page-regen-status '+esc(s.kind||'')+'" data-overview-status="'+esc(sceneId)+'">'+esc(s.text||'')+'</div>';}
function overviewPromptPanel(o){var full=overviewPromptFull(o);var hasPrompt=Boolean(full);if(!hasPrompt){return '<section class="page-prompt"><div class="page-prompt-title"><span>Overview Prompt</span></div><div class="empty">未匹配到 Overview 提示词；请检查 设计-design-sheet提示词.md 是否包含 场景类型: overview。</div></section>';}return '<section class="page-prompt"><div class="page-prompt-title"><span>'+(overviewShowFullPrompt?'完整 Overview Prompt':'Overview Prompt（隐藏质量/负面约束）')+'</span><button class="btn" data-overview-edit data-overview-scene="'+esc(o.sceneId)+'">✏️ 编辑 Prompt</button></div><pre class="page-prompt-pre">'+esc(overviewPromptDisplay(o))+'</pre><textarea class="page-prompt-edit" data-overview-textarea data-overview-scene="'+esc(o.sceneId)+'">'+esc(full)+'</textarea></section>';}
function overviewVisualPanel(o,img,title,tags){var full=overviewPromptFull(o);var hasPrompt=Boolean(full);var available=regenAvailable();var disabled=(!available||!hasPrompt||overviewRegenBusy[o.sceneId])?' disabled':'';var hint=available?'':'<div class="page-hint">重新生成需要通过流水线本地服务打开本页；可从带 --open 的 流水线总览.html 进入。</div>';var promptHint=hasPrompt?'':'<div class="page-hint">未匹配到 Overview Prompt，暂不可重新生成。</div>';return '<section class="page-visual"><div class="page-image-box">'+img+'</div><div class="page-meta"><div class="page-name">'+esc(o.label||o.sceneId||'总览图')+'</div><div class="page-path" title="'+esc(title)+'">'+esc(title)+'</div>'+(tags.length?'<div class="page-tags">'+tags.map(function(t){return '<span class="page-tag">'+esc(t)+'</span>';}).join('')+'</div>':'')+'</div><div class="page-actions"><button class="btn primary" data-overview-regen data-overview-scene="'+esc(o.sceneId)+'"'+disabled+'>🔄 重新生成总览图</button></div>'+promptHint+hint+overviewStatusHtml(o.sceneId)+'</section>';}
function renderOverviewGallery(S,a){var overviews=S.overviews||[];if(a&&a.readError)return '<div class="page-toolbar"><span class="page-status warn">引用数据异常</span><span>'+esc(a.readError)+'</span></div><div class="missing-note">请打开引用数据检查 JSON 结构。</div>';if(!overviews.length)return '<div class="page-toolbar"><span class="page-status warn">0 张总览图</span></div><div class="missing-note">总览图引用数据未生成，且未匹配到 Overview 提示词。</div>';var missing=overviews.filter(function(o){return !o.src;}).length;var promptCount=(S.overviewPrompts&&S.overviewPrompts.count)||0;var refs=S.overviewRefs||{};var toolbar='<div class="page-toolbar"><span class="page-status">'+overviews.length+' 张总览图</span>'+(promptCount?'<span class="page-status">'+promptCount+' 条 Overview 提示词</span>':'')+(missing?'<span class="page-status warn">'+missing+' 张缺少可用图片</span>':'')+(refs.generatedAt?'<span>生成 '+esc(refs.generatedAt)+'</span>':'')+(overviews.some(function(o){return o.promptExists;})?'<button class="btn" data-overview-full>'+(overviewShowFullPrompt?'🙈 隐藏质量/负面约束':'👁️ 显示完整 Prompt')+'</button>':'')+'</div>';return toolbar+'<div class="page-grid">'+overviews.map(function(o){var title=o.localPath||o.imageUrl||o.sceneId||'';var img=o.src?'<a href="'+esc(o.src)+'" target="_blank"><img class="page-thumb" src="'+esc(o.src)+'" alt="'+esc(o.label||o.sceneId||'总览图')+'"></a>':'<div class="page-missing">'+(o.localPath?'本地图片缺失':'未找到图片')+'</div>';var tags=[];if(o.srcKind==='local')tags.push('本地图片');if(o.srcKind==='remote')tags.push('远程图片');if(o.localPath&&!o.localExists)tags.push('本地缺失');if(o.mimeType)tags.push(o.mimeType.replace('image/',''));if(o.promptRatio)tags.push('比例 '+o.promptRatio);if(o.model)tags.push(o.model);return '<div class="page-item '+(overviewEditingScene===o.sceneId?'editing':'')+'" data-overview-scene="'+esc(o.sceneId)+'">'+overviewPromptPanel(o)+overviewVisualPanel(o,img,title,tags)+'</div>';}).join('')+'</div>';}
function apiBase(){var S=window.IDEA_PIPELINE_DATA||{};return (location.protocol==='http:'||location.protocol==='https:')?'':(S.serverBaseUrl||'');}
function regenAvailable(){return Boolean(apiBase()||location.protocol==='http:'||location.protocol==='https:');}
function pagePromptFull(p){if(Object.prototype.hasOwnProperty.call(pagePromptOverrides,p.sceneId))return pagePromptOverrides[p.sceneId];return p.promptZh||p.promptEn||'';}
function isHiddenPagePromptSection(title){return /质量要求|负面约束|QUALITY|NEGATIVE/i.test(String(title||''));}
function stripHiddenPagePromptSections(text){var hidden=false;return String(text||'').split('\n').filter(function(line){var m=line.match(/^【([^】]+)】\s*$/);if(m)hidden=isHiddenPagePromptSection(m[1]);return !hidden;}).join('\n').replace(/\n{3,}/g,'\n\n').trim();}
function pagePromptDisplay(p){var text=pagePromptFull(p);return pageShowFullPrompt?text:stripHiddenPagePromptSections(text);}
function pageStatusHtml(sceneId){var s=pageRegenStatus[sceneId]||{};return '<div class="page-regen-status '+esc(s.kind||'')+'" data-page-status="'+esc(sceneId)+'">'+esc(s.text||'')+'</div>';}
function pagePromptPanel(p){var full=pagePromptFull(p);var hasPrompt=Boolean(full);if(!hasPrompt){return '<section class="page-prompt"><div class="page-prompt-title"><span>Page Prompt</span></div><div class="empty">未匹配到对应 page 提示词；请检查 设计-design-sheet提示词.md 是否包含该 scene。</div></section>';}return '<section class="page-prompt"><div class="page-prompt-title"><span>'+(pageShowFullPrompt?'完整 Page Prompt':'Page Prompt（隐藏质量/负面约束）')+'</span><button class="btn" data-page-edit data-page-scene="'+esc(p.sceneId)+'">✏️ 编辑 Prompt</button></div><pre class="page-prompt-pre">'+esc(pagePromptDisplay(p))+'</pre><textarea class="page-prompt-edit" data-page-textarea data-page-scene="'+esc(p.sceneId)+'">'+esc(full)+'</textarea></section>';}
function pageVisualPanel(p,img,title,tags){var full=pagePromptFull(p);var hasPrompt=Boolean(full);var available=regenAvailable();var disabled=(!available||!hasPrompt||pageRegenBusy[p.sceneId])?' disabled':'';var hint=available?'':'<div class="page-hint">重新生成需要通过流水线本地服务打开本页；可从带 --open 的 流水线总览.html 进入。</div>';var promptHint=hasPrompt?'':'<div class="page-hint">未匹配到对应 Page Prompt，暂不可重新生成。</div>';return '<section class="page-visual"><div class="page-image-box">'+img+'</div><div class="page-meta"><div class="page-name">'+esc(p.label||p.sceneId||'Page 图')+'</div><div class="page-path" title="'+esc(title)+'">'+esc(title)+'</div>'+(tags.length?'<div class="page-tags">'+tags.map(function(t){return '<span class="page-tag">'+esc(t)+'</span>';}).join('')+'</div>':'')+'</div><div class="page-actions"><button class="btn primary" data-page-regen data-page-scene="'+esc(p.sceneId)+'"'+disabled+'>🔄 重新生成 Page 图</button></div>'+promptHint+hint+pageStatusHtml(p.sceneId)+'</section>';}
function renderPageGallery(S,a){var pages=S.pages||[];if(a&&a.readError)return '<div class="page-toolbar"><span class="page-status warn">引用数据异常</span><span>'+esc(a.readError)+'</span></div><div class="missing-note">请打开引用数据检查 JSON 结构。</div>';if(!pages.length)return '<div class="page-toolbar"><span class="page-status warn">0 张 Page 图</span></div><div class="missing-note">Page 图引用数据已生成，但 pages 列表为空。</div>';var missing=pages.filter(function(p){return !p.src;}).length;var promptCount=(S.pagePrompts&&S.pagePrompts.count)||0;var refs=S.pageRefs||{};var toolbar='<div class="page-toolbar"><span class="page-status">'+pages.length+' 张 Page 图</span>'+(promptCount?'<span class="page-status">'+promptCount+' 条 Page 提示词</span>':'')+(missing?'<span class="page-status warn">'+missing+' 张缺少可用图片</span>':'')+(refs.generatedAt?'<span>生成 '+esc(refs.generatedAt)+'</span>':'')+(pages.some(function(p){return p.promptExists;})?'<button class="btn" data-page-full>'+(pageShowFullPrompt?'🙈 隐藏质量/负面约束':'👁️ 显示完整 Prompt')+'</button>':'')+'</div>';return toolbar+'<div class="page-grid">'+pages.map(function(p){var title=p.localPath||p.imageUrl||p.sceneId||'';var img=p.src?'<a href="'+esc(p.src)+'" target="_blank"><img class="page-thumb" src="'+esc(p.src)+'" alt="'+esc(p.label||p.sceneId||'Page 图')+'"></a>':'<div class="page-missing">'+(p.localPath?'本地图片缺失':'未找到图片')+'</div>';var tags=[];if(p.srcKind==='local')tags.push('本地图片');if(p.srcKind==='remote')tags.push('远程图片');if(p.localPath&&!p.localExists)tags.push('本地缺失');if(p.mimeType)tags.push(p.mimeType.replace('image/',''));if(p.promptRatio)tags.push('比例 '+p.promptRatio);if(p.model)tags.push(p.model);return '<div class="page-item '+(pageEditingScene===p.sceneId?'editing':'')+'" data-page-scene="'+esc(p.sceneId)+'">'+pagePromptPanel(p)+pageVisualPanel(p,img,title,tags)+'</div>';}).join('')+'</div>';}
function findPage(S,sceneId){return (S.pages||[]).find(function(p){return String(p.sceneId)===String(sceneId);});}
function findPageEl(sceneId){return app.querySelector('.page-item[data-page-scene="'+String(sceneId).replace(/"/g,'\"')+'"]');}
function setPageRegenStatus(sceneId,text,kind){pageRegenStatus[sceneId]={text:text||'',kind:kind||''};var el=findPageEl(sceneId);var status=el&&el.querySelector('[data-page-status="'+String(sceneId).replace(/"/g,'\"')+'"]');if(status){status.textContent=text||'';status.classList.toggle('ok',kind==='ok');status.classList.toggle('err',kind==='err');}}
function bindPageActions(S){var fullBtn=app.querySelector('[data-page-full]');if(fullBtn)fullBtn.addEventListener('click',function(){pageShowFullPrompt=!pageShowFullPrompt;render();});app.querySelectorAll('[data-page-textarea]').forEach(function(ta){ta.addEventListener('input',function(){pagePromptOverrides[ta.getAttribute('data-page-scene')]=ta.value;});});app.querySelectorAll('[data-page-edit]').forEach(function(btn){btn.addEventListener('click',function(){var scene=btn.getAttribute('data-page-scene');var p=findPage(S,scene);var item=findPageEl(scene);if(!p||!item)return;var ta=item.querySelector('.page-prompt-edit');var pre=item.querySelector('.page-prompt-pre');var editing=!item.classList.contains('editing');item.classList.toggle('editing',editing);btn.textContent=editing?'✅ 完成编辑':'✏️ 编辑 Prompt';if(editing){pageEditingScene=scene;ta.value=pagePromptFull(p);ta.focus();ta.selectionStart=ta.selectionEnd=ta.value.length;}else{pagePromptOverrides[scene]=ta.value;pageEditingScene='';if(pre)pre.textContent=pagePromptDisplay(p);}});});app.querySelectorAll('[data-page-regen]').forEach(function(btn){btn.addEventListener('click',function(){regeneratePage(S,btn.getAttribute('data-page-scene'),btn);});});}
function updatePagePreview(sceneId,p,json){var item=findPageEl(sceneId);if(!item)return;if(json.previewUrl){var box=item.querySelector('.page-image-box');if(box)box.innerHTML='<a href="'+esc(json.previewUrl)+'" target="_blank"><img class="page-thumb" src="'+esc(json.previewUrl)+'" alt="'+esc(p.label||p.sceneId||'Page 图')+'"></a>';}var pathText=json.output||p.localPath||p.imageUrl||p.sceneId||'';var pathEl=item.querySelector('.page-path');if(pathEl){pathEl.textContent=pathText;pathEl.title=pathText;}}
async function regeneratePage(S,sceneId,btn){var p=findPage(S,sceneId);if(!p)return;var item=findPageEl(sceneId);var ta=item&&item.querySelector('.page-prompt-edit');var prompt=ta?ta.value:pagePromptFull(p);pagePromptOverrides[sceneId]=prompt;if(!prompt.trim()){setPageRegenStatus(sceneId,'生成失败：prompt 不能为空','err');return;}if(!regenAvailable()){setPageRegenStatus(sceneId,'请通过流水线本地服务打开本页后再重新生成。','err');return;}pageRegenBusy[sceneId]=true;btn.disabled=true;setPageRegenStatus(sceneId,'生成中，请稍候...');try{var res=await fetch(apiBase()+'/__idea_page_regenerate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sceneId:p.sceneId,fileName:p.promptFileName||p.fileName||('page_'+p.sceneId+'.png'),ratio:p.promptRatio||'',prompt:prompt,localPath:p.localPath||''})});var json=await res.json().catch(function(){return {};});if(!res.ok||!json.success)throw new Error(json.error||('HTTP '+res.status));if(json.previewUrl)p.src=json.previewUrl;p.srcKind='local';p.localExists=true;p.localPath=json.output||p.localPath;p.fileName=json.fileName||p.fileName;p.imageUrl=json.imageUrl||p.imageUrl;p.mimeType=json.mimeType||p.mimeType;updatePagePreview(sceneId,p,json);setPageRegenStatus(sceneId,'生成完成：'+(json.output||p.localPath||''),'ok');}catch(err){setPageRegenStatus(sceneId,'生成失败：'+err.message,'err');}finally{delete pageRegenBusy[sceneId];btn.disabled=false;var currentBtn=findPageEl(sceneId)?.querySelector('[data-page-regen]');if(currentBtn)currentBtn.disabled=false;}}
function findOverview(S,sceneId){return (S.overviews||[]).find(function(o){return String(o.sceneId)===String(sceneId);});}
function findOverviewEl(sceneId){return app.querySelector('.page-item[data-overview-scene="'+String(sceneId).replace(/"/g,'\"')+'"]');}
function setOverviewRegenStatus(sceneId,text,kind){overviewRegenStatus[sceneId]={text:text||'',kind:kind||''};var el=findOverviewEl(sceneId);var status=el&&el.querySelector('[data-overview-status="'+String(sceneId).replace(/"/g,'\"')+'"]');if(status){status.textContent=text||'';status.classList.toggle('ok',kind==='ok');status.classList.toggle('err',kind==='err');}}
function updateOverviewPreview(sceneId,o,json){var item=findOverviewEl(sceneId);if(!item)return;if(json.previewUrl){var box=item.querySelector('.page-image-box');if(box)box.innerHTML='<a href="'+esc(json.previewUrl)+'" target="_blank"><img class="page-thumb" src="'+esc(json.previewUrl)+'" alt="'+esc(o.label||o.sceneId||'总览图')+'"></a>';}var pathText=json.output||o.localPath||o.imageUrl||o.sceneId||'';var pathEl=item.querySelector('.page-path');if(pathEl){pathEl.textContent=pathText;pathEl.title=pathText;}}
async function regenerateOverview(S,sceneId,btn){var o=findOverview(S,sceneId);if(!o)return;var item=findOverviewEl(sceneId);var ta=item&&item.querySelector('.page-prompt-edit');var prompt=ta?ta.value:overviewPromptFull(o);overviewPromptOverrides[sceneId]=prompt;if(!prompt.trim()){setOverviewRegenStatus(sceneId,'生成失败：prompt 不能为空','err');return;}if(!regenAvailable()){setOverviewRegenStatus(sceneId,'请通过流水线本地服务打开本页后再重新生成。','err');return;}overviewRegenBusy[sceneId]=true;btn.disabled=true;setOverviewRegenStatus(sceneId,'生成中，请稍候...');try{var res=await fetch(apiBase()+'/__idea_overview_regenerate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sceneId:o.sceneId,fileName:o.promptFileName||o.fileName||('overview_'+o.sceneId+'.png'),ratio:o.promptRatio||'3:2',prompt:prompt,localPath:o.localPath||''})});var json=await res.json().catch(function(){return {};});if(!res.ok||!json.success)throw new Error(json.error||('HTTP '+res.status));if(json.previewUrl)o.src=json.previewUrl;o.srcKind='local';o.localExists=true;o.localPath=json.output||o.localPath;o.fileName=json.fileName||o.fileName;o.imageUrl=json.imageUrl||o.imageUrl;o.mimeType=json.mimeType||o.mimeType;updateOverviewPreview(sceneId,o,json);setOverviewRegenStatus(sceneId,'生成完成：'+(json.output||o.localPath||''),'ok');}catch(err){setOverviewRegenStatus(sceneId,'生成失败：'+err.message,'err');}finally{delete overviewRegenBusy[sceneId];btn.disabled=false;var currentBtn=findOverviewEl(sceneId)?.querySelector('[data-overview-regen]');if(currentBtn)currentBtn.disabled=false;}}
function bindOverviewActions(S){var fullBtn=app.querySelector('[data-overview-full]');if(fullBtn)fullBtn.addEventListener('click',function(){overviewShowFullPrompt=!overviewShowFullPrompt;render();});app.querySelectorAll('[data-overview-textarea]').forEach(function(ta){ta.addEventListener('input',function(){overviewPromptOverrides[ta.getAttribute('data-overview-scene')]=ta.value;});});app.querySelectorAll('[data-overview-edit]').forEach(function(btn){btn.addEventListener('click',function(){var scene=btn.getAttribute('data-overview-scene');var o=findOverview(S,scene);var item=findOverviewEl(scene);if(!o||!item)return;var ta=item.querySelector('.page-prompt-edit');var pre=item.querySelector('.page-prompt-pre');var editing=!item.classList.contains('editing');item.classList.toggle('editing',editing);btn.textContent=editing?'✅ 完成编辑':'✏️ 编辑 Prompt';if(editing){overviewEditingScene=scene;ta.value=overviewPromptFull(o);ta.focus();ta.selectionStart=ta.selectionEnd=ta.value.length;}else{overviewPromptOverrides[scene]=ta.value;overviewEditingScene='';if(pre)pre.textContent=overviewPromptDisplay(o);}});});app.querySelectorAll('[data-overview-regen]').forEach(function(btn){btn.addEventListener('click',function(){regenerateOverview(S,btn.getAttribute('data-overview-scene'),btn);});});}
function typeLabel(t){return t==='concepts'?'图集':(t==='overview'?'OVERVIEW':(t==='pages'?'PAGE':String(t||'').toUpperCase()));}
function artifactBadge(a){if(!a.exists)return '未生成';if(a.type==='concepts')return (a.conceptCount||0)+' 张';if(a.type==='overview')return (a.overviewCount||0)+' 张';if(a.type==='pages')return (a.pageCount||0)+' 张';return typeLabel(a.type);}
function artifactTodos(S, a){return (S.todosByArtifact&&S.todosByArtifact[a.file])||[];}
function renderPreview(S,a){
  if(!a)return '<div class="viewer missing-note">当前步骤暂无可预览产物。</div>';
  var actions='<a class="btn" href="./'+esc(a.file)+'" target="_blank">打开原文件</a>';
  if(a.type==='html')actions='<a class="btn primary" href="./'+esc(a.file)+'" target="_blank">打开专用页面 →</a>';
  if(a.type==='concepts')actions=a.refsExists?'<a class="btn" href="./'+esc(a.file)+'" target="_blank">打开引用数据</a>':'';
  if(a.type==='overview')actions=a.refsExists?'<a class="btn" href="./'+esc(a.file)+'" target="_blank">打开引用数据</a>':'';
  if(a.type==='pages')actions=a.refsExists?'<a class="btn" href="./'+esc(a.file)+'" target="_blank">打开引用数据</a>':'';
  var metaText=a.type==='concepts'?((a.conceptCount||0)+' 张概念图 · '+a.file):(a.type==='overview'?((a.overviewCount||0)+' 张总览图 · '+a.file):(a.type==='pages'?((a.pageCount||0)+' 张 Page 图 · '+a.file):a.file));
  var html='<div class="preview-head"><h2>'+esc(a.label)+'</h2><span class="pill '+esc(a.type)+'">'+esc(typeLabel(a.type))+'</span><span class="meta">'+esc(metaText)+'</span><div class="preview-actions">'+(a.exists?actions:'')+'</div></div>';
  html+='<div class="artifact-todo"><div class="todo-section-title">📝 本产物相关 TODO</div>'+todoHtml(artifactTodos(S,a),'本产物暂无单独确认项，请参考当前步骤 TODO。')+'</div>';
  if(a.type==='concepts'){
    if(!a.exists)return html+'<div class="viewer missing-note">产物尚未生成：<br><code>'+esc(a.file)+'</code></div>';
    return html+'<div class="viewer">'+renderConceptGallery(S,a)+'</div>';
  }
  if(a.type==='overview'){
    if(!a.exists)return html+'<div class="viewer missing-note">产物尚未生成：<br><code>'+esc(a.file)+'</code></div>';
    return html+'<div class="viewer">'+renderOverviewGallery(S,a)+'</div>';
  }
  if(a.type==='pages'){
    if(!a.exists)return html+'<div class="viewer missing-note">产物尚未生成：<br><code>'+esc(a.file)+'</code></div>';
    return html+'<div class="viewer">'+renderPageGallery(S,a)+'</div>';
  }
  if(!a.exists)return html+'<div class="viewer missing-note">产物尚未生成：<br><code>'+esc(a.file)+'</code></div>';
  if(a.type==='html')return html+'<div class="viewer special-note"><div class="big">🧩</div><p>该产物有专用交互页面，请点击上方「打开专用页面」查看 / 编辑 / 导出变更。</p></div>';
  var body=a.type==='json'?'<pre><code>'+esc(a.content||'')+'</code></pre>':renderMd(a.content||'');
  var trunc=a.truncated?'<div class="truncated">预览内容已截断，完整内容请打开原文件。</div>':'';
  return html+'<div class="viewer">'+trunc+body+'</div>';
}
function chooseInitial(S){var cur=S.current;var arts=(S.artifacts||[]);return (arts.find(function(a){return a.stepId===cur&&a.exists;})||arts.find(function(a){return a.exists;})||arts[0]||null);}
function render(){
  var S=window.IDEA_PIPELINE_DATA;if(!S){app.innerHTML='<div class="card empty">未找到 idea-pipeline-data.js，流水线尚未初始化。</div>';return;}
  if(!selected){var init=chooseInitial(S);selected=init&&init.id;}
  var art=(S.artifacts||[]).find(function(a){return a.id===selected;})||chooseInitial(S);
  var html='<div class="head"><h1>🎬 '+esc(S.meta.project||'idea2game')+' · 流水线总览</h1><span class="meta">'+(S.meta.version?'v'+esc(S.meta.version)+' · ':'')+'更新 '+esc(S.meta.updatedAt||'')+'</span></div>';
  html+='<div class="card"><div class="steps">'+S.steps.map(function(st){var icon=st.status==='done'?'✓':(st.status==='current'?'◉':st.id);return '<div class="step '+esc(st.status)+'"><div class="dot">'+icon+'</div><div class="nm">'+esc(st.name)+'</div><div class="cnt">'+st.existsCount+'/'+st.artifactCount+' 产物</div></div>';}).join('')+'</div></div>';
  var cur=S.steps.find(function(s){return s.id===S.current;})||S.steps[0];
  html+='<div class="card focus"><h2>▶ 当前：'+cur.id+' '+esc(cur.name)+'</h2><div class="hint">这步在做：'+esc(cur.hint||'')+'</div><div class="todo-section-title">📝 当前步骤 TODO</div>'+todoHtml(S.currentTodos,'本步暂无人工 TODO。')+'</div>';
  html+='<div class="grid"><aside class="card side"><h3>📂 产物列表</h3><div class="art-list">'+(S.artifacts||[]).map(function(a){return '<button class="art '+(art&&art.id===a.id?'active ':'')+(a.exists?'':'missing')+'" data-art="'+esc(a.id)+'" '+(a.exists?'':'disabled')+'><span class="art-step">#'+a.stepId+'</span><span class="art-name">'+esc(a.label)+'</span><span class="pill '+(a.exists?esc(a.type):'missing')+'">'+esc(artifactBadge(a))+'</span></button>';}).join('')+'</div></aside><main>'+renderPreview(S,art)+'</main></div>';
  app.innerHTML=html;
  app.querySelectorAll('[data-art]').forEach(function(btn){btn.addEventListener('click',function(){selected=btn.getAttribute('data-art');render();});});
  bindOverviewActions(S);
  bindPageActions(S);
}
render();
function pollData(){
  var s=document.createElement('script');
  s.src='./idea-pipeline-data.js?t='+Date.now();
  s.onload=function(){if(!pageEditingScene&&!overviewEditingScene)render(); if(s.parentNode)s.parentNode.removeChild(s);};
  s.onerror=function(){if(s.parentNode)s.parentNode.removeChild(s);};
  document.body.appendChild(s);
}
setInterval(pollData,3000);
})();
</script>
</body>
</html>
